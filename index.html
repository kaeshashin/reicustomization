<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Character Customizer (Images)</title>

<!-- Anime.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

<style>
body {
  font-family: Arial;
  background-image: url("polka dots.jpg");
    background-repeat: no-repeat; 
    background-size:cover;

  display: flex;
  justify-content: center;   
  align-items: center;   
  height: 100vh;            
  margin: 0;       
}

h3 {
    color:#6740bb;
}

.dress-up {
  display: flex;
  gap: 30px;
  background-color: rgb(255, 232, 140);
  padding: 30px;
  width: 870px;
  align-items: center;
  border-left: 5px solid rgb(64, 89, 198);
   border-right: 5px solid rgb(64, 89, 198);
    border-bottom: 5px solid rgb(64, 89, 198);
}
.reirei {
    border-radius: 15px;
  width: 410px;
  border: 5px solid rgb(52, 91, 198);
    height: 550px;
   align-items: center;
   background-image: url("sky idk.jpeg");
    background-repeat: no-repeat; /* Prevents the image from tiling */
    background-size: 416px 597px;      /* Scales the image to fill the screen */
   
    /* Keeps image fixed during scroll */
  
     /* Centers the image */
}

/* CHARACTER */     
#character {
  position: relative;
  width: 400px;
  height: 450px;
}

/* LAYERS */
#character img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
}

/* PANEL */
.panel {
  background-image: linear-gradient(rgb(182, 202, 255), rgb(242, 186, 255));
  padding-left: 30px;
  padding-bottom: 40px;
  border-radius: 15px;
  width: 370px;
  border: 5px solid rgb(52, 91, 198);
}

/* OPTIONS */
.options {
  margin-top: 5px;
}

.options button {
  margin: 5px;
  padding: 8px;
}

/* ACTIVE TAB */
.active {
  background: #333;
  color: white;
}

.options {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.options img {
  width: 90px;
  height: 90px;
  object-fit: contain;
  cursor: pointer;
  border-radius: 10px;
  transition: 0.2s;
  margin-left: 5px;
  margin-right: 5px;
  border: 5px solid;
  
}

.options img:hover {
  transform: scale(1.1);
  border-color: #774ed1;
}

.tab{
    background-color: rgb(64, 89, 198);
    color:aliceblue;
    padding: 2px;
    padding-left: 20px;
}
</style>
</head>

<body>
    <div class="customize">
    <div class="tab"><h2>NAOI REI'S DRESS UP</h2></div>
<!-- CHARACTER -->
 <div class="dress-up">
<div class="reirei">
<div id="character">
    <img id="shoes" src="rei_shoes.png">
    <img id="clothes" src="rei_dress.png">
    <img id="head" src="rei_head.png">
</div>
</div>
<!-- CONTROL PANEL -->
<div class="panel">
  <div class="options">
    <div class="group">
      <h3>REI'S FACE</h3>
      <img src="melodyhead.jpeg" onclick="changePart('head','melody_head.png')" style="border-color: rgb(229, 71, 176);">
      <img src="kuromihead.jpeg" onclick="changePart('head','kuromi_head.png')" style="border-color: rgb(174, 71, 229);">
      <img src="reihead.jpeg" onclick="changePart('head','rei_head.png')" style="border-color: rgb(229, 145, 71);">
    </div>

    <div class="group">
      <h3>REI'S OUTFITS</h3>
      <img src="melodydress.jpeg" onclick="changePart('clothes','melody_dress.png')" style="border-color: rgb(229, 71, 176);">
      <img src="kuromidress.jpeg" onclick="changePart('clothes','kuromi_dress.png')" style="border-color: rgb(174, 71, 229);">
      <img src="reidress.jpeg" onclick="changePart('clothes','rei_dress.png')" style="border-color: rgb(229, 145, 71);">
    </div>

    <div class="group">
      <h3>REI'S SHOES</h3>
      <img src="melodyshoes.jpeg" onclick="changePart('shoes','melody_shoes.png')" style="border-color: rgb(229, 71, 176);">
      <img src="kuromishoes.jpeg" onclick="changePart('shoes','kuromi_shoes.png')" style="border-color: rgb(174, 71, 229);">
      <img src="reishoes.jpeg" onclick="changePart('shoes','rei_shoes.png')" style="border-color: rgb(229, 145, 71);">
    </div>
  </div>
</div>
</div>
<script>

  loadSavedParts();

function loadSavedParts() {
  const head = localStorage.getItem("head");
  const clothes = localStorage.getItem("clothes");
  const shoes = localStorage.getItem("shoes");

  console.log("Loading saved parts:", { head, clothes, shoes });
  
  if (head) {
    document.getElementById("head").src = head;
  }
  if (clothes) {
    document.getElementById("clothes").src = clothes;
  }
  if (shoes) {
    document.getElementById("shoes").src = shoes;
  }
}

/* SHOW CATEGORY */
function showCategory(category) {
  document.getElementById("head-options").style.display = "none";
  document.getElementById("clothes-options").style.display = "none";
  document.getElementById("shoes-options").style.display = "none";

  document.getElementById(category + "-options").style.display = "block";
}

/* CHANGE PART */
function changePart(partId, newSrc) {
  const el = document.getElementById(partId);
  localStorage.setItem(partId, newSrc);

  anime({
    targets: el,
    opacity: 1,
    duration: 200,
    easing: 'easeInOutQuad',
    complete: () => {
      el.src = newSrc;

      anime({
        targets: el,
        opacity: 1,
        scale: [0.9, 1],
        duration: 300,
        easing: 'easeOutBack'
      });
    }
  });
}

</script>

</body>
</html>
